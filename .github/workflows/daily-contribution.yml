name: Daily Contribution

on:
  schedule:
    - cron: '30 18 * * *'  # Runs daily at midnight IST (18:30 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  contribute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Make contribution
        run: |
          echo "Daily contribution $(date)" >> contributions.log
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "Daily contribution $(date +%Y-%m-%d)"
          git push
