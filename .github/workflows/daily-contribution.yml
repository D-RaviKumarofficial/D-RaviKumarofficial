name: Daily Contribution

on:
  schedule:
    - cron: '30 18 * * *'  # Runs daily at midnight IST (18:30 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  contribute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
      
      - name: Make contributions
        run: |
          git config user.name "Ravi Kumar"
          git config user.email "ravikbd22@gmail.com"
          export TZ=Asia/Kolkata
          COMMITS=$((RANDOM % 5 + 1))
          for i in $(seq 1 $COMMITS); do
            echo "Contribution $i at $(date)" >> contributions.log
            git add .
            git diff --staged --quiet || git commit -m "Contribution $(date +%Y-%m-%d-%H%M%S)-$i"
            sleep 2
          done
          git push
